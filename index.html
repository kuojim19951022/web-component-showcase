<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>元件展示</title>
    <link rel="stylesheet" href="dist/css/main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <main class="main-container index-page">
      <h1 class="title">元件展示</h1>
      <nav class="nav" aria-label="元件展示選單">
        <ul class="list">
          <li class="list-item book-btn">

              <i class="fa-solid fa-file-pdf link__icon" aria-hidden="true"></i>
              <span class="link__text">PDF 閱讀器展示</span>
            </a>
          </li>
          <li class="list-item video-btn">

              <span class="link__text">YouTube 彈窗展示</span>

          </li>
          <li class="list-item music-btn">
            <a href="src/pages/music.html" class="link">

              <span class="link__text">音樂播放器展示</span>
            </a>
          </li>
          <li class="list-item marquee-btn">
            <a href="src/pages/marquee-ticker.html" class="link">
              <i
                class="fa-solid fa-arrow-right-arrow-left link__icon"

              ></i>
