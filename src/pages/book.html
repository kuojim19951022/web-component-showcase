<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 閱讀器展示</title>
    <link rel="stylesheet" href="../../dist/css/main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="">
      <div class="main-container book-page">
        <h1 class="title">PDF 閱讀器展示</h1>
        <p class="base-button-purple">
          <a href="../../index.html">← 返回首頁</a>
        </p>
      </div>

      <div class="bookshelf-top-item is-loading" aria-hidden="true"></div>
      <div class="book-grid-container">
        <!-- 書本項目 -->
      </div>

      <div class="load-more-container">
        <a
          id="load-more-book"
          class="base-button-purple"
          data-offset="18"
          style="display: none"
        >
          載入更多 <i class="fa-solid fa-arrows-rotate"></i>
        </a>
      </div>

      <button
        id="totop-btn"
        class="base-button-purple totop-btn is-hidden"
        type="button"
        aria-label="回到頁面頂端"
        title="回到頂端"
      >
        <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
      </button>
    </div>

    <!-- Handlebars 模板 -->
    <script id="book-item-template" type="text/x-handlebars-template">
      {{#each books}}
      <div class="book-item" data-id="{{id}}">
          <div class="book-item-info">
              <h3 class="book-item-title">{{title}}</h3>
          </div>
          <div class="book-item-cover{{#unless coverImage}} is-default{{/unless}}">
              {{#if coverImage}}
                <img
                  src="{{coverImage}}"
                  alt="{{title}}"
                  onerror="
                    this.style.display='none';
                    const cover=this.closest('.book-item-cover');
                    if (cover) cover.classList.add('is-default');
                  "
                >
              {{/if}}
              <div class="book-item-cover-fallback" aria-hidden="true">
                <i class="fa-solid fa-book"></i>
              </div>
              <div class="book-item-overlay">
                  <div class="book-item-buttons">
                      {{#if pdfUrl}}
                        <a
                          href="./pdfViewer.html?id={{id}}"
                          target="_blank"
                          rel="noopener noreferrer"
                          class="book-btn"
                          title="線上閱讀"
                        >
                          <i class="far fa-eye"></i>閱讀
                        </a>
                      {{else}}
                        <span
                          class="book-btn is-disabled"
                          aria-disabled="true"
                          title="尚無閱讀檔案"
                        >
                          <i class="far fa-eye"></i>閱讀
                        </span>
                      {{/if}}
                      {{#if pdfUrl}}
                        <a
                          href="{{pdfUrl}}"
                          class="book-btn book-btn-download"
                          download
                          rel="noopener noreferrer"
                          title="下載PDF"
                        >
                          <i class="fa fa-download"></i>下載
                        </a>
                      {{else}}
                        <span
                          class="book-btn book-btn-download is-disabled"
                          aria-disabled="true"
                          title="尚無下載檔案"
                        >
                          <i class="fa fa-download"></i>下載
                        </span>
                      {{/if}}
                  </div>
              </div>
          </div>
      </div>
      {{/each}}
    </script>

    <!-- Handlebars.js 模板引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>
    <script src="../js/book.js"></script>
  </body>
</html>
